# Generated by ado-test-selector --discover-config
# Un-commented values were detected with high confidence or are valid defaults.
# Commented values are probable candidates; review and uncomment one if the active value is wrong.

[paths]
source_dir = "src" # found default
robot_suites_dir = "tests/functional/test_suites" # found default
robot_library_dir = "tests/functional/library" # found default
test_plan_dir = "tests/functional/test_plan" # found default
pipeline_dir = "tools/pipelines" # found default

[pipelines]
pr_yaml_name_contains = ["pull_request"]
yaml_extensions = ["yaml", "yml"]
test_plan_keys = ["TestPlan", "test_plan"]
# If PR YAMLs use another naming convention, add a unique substring above.

[firmware]
cli_registration_regex = 'NULL_LIST_ENTRY\s*,\s*"([^"]+)"\s*,'
module_path_anchors = ["mscp", "accel", "common"]
# Look for the path component immediately before firmware module names and add it above.
# If CLI tables do not use NULL_LIST_ENTRY, replace cli_registration_regex with the group-capturing regex.

[must_run]
patterns = [
  { path_contains = "test_suites/ddrboot_tests/", reason = "DDR boot - memory init must succeed" },
  { path_contains = "test_suites/boot_tests/", reason = "Boot sanity - system must boot after firmware change" },
  { path_contains = "test_suites/heart_beat/", reason = "Heartbeat - firmware must respond after flash" },
  { path_contains = "test_suites/accel_uptime/", reason = "Uptime - system must stay up after boot" },
  { path_contains = "commit_id_test", reason = "Commit ID - firmware version must be correct" },
]
# Add safety suites that should run for every PR, such as boot, heartbeat, DDR, smoke, or version checks.
