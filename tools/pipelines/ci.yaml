
name: 0.1.0.$(rev:r)

trigger: 
  branches:
    include:
    - main    # Auto trigger pipeline every time there is a PR completion to main, enables promoting (tagging) for official builds

variables:
- group: ef-pipeline-config-azurekv
- name: OfficialBuild
  value : $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]

# Build stage
stages:
- stage: Build_x86_Debug
  dependsOn: []
  jobs:
  - template: templates/build.yaml
    parameters:
      Toolchain: i386-pc-windows-msvc
      Configuration: Debug
      ArtifactName: Build_x86_Debug

- stage: Build_Arm_EABI_AARCH_Debug
  dependsOn: []
  jobs:
  - template: templates/build.yaml
    parameters:
      Toolchain: arm-eabi-aarch
      Configuration: Debug
      ArtifactName: Build_Arm_EABI_AARCH_Debug

- stage: SVP_Pythia_Tests_SingleDie
  dependsOn: [Build_Arm_EABI_AARCH_Debug]
  jobs:
  - template: templates/svp_pythia_test.yaml
    parameters:
      ArtifactName: SVP_Pythia_Tests_SingleDie
      TestPlan: .\tests\functional\pythia\test_plan\svp_single_die_ci_test_plan.args

- stage: SVP_Pythia_Tests_DualDie
  dependsOn: [Build_Arm_EABI_AARCH_Debug]
  jobs:
  - template: templates/svp_pythia_test.yaml
    parameters:
      ArtifactName: SVP_Pythia_Tests_DualDie
      TestPlan: .\tests\functional\pythia\test_plan\svp_dual_die_ci_test_plan.args

- stage: Unit_Test_x86
  dependsOn: [Build_x86_Debug, Build_Arm_EABI_AARCH_Debug]
  jobs:
  - template: templates/unittest.yaml
    parameters:
      Toolchain: i386-pc-windows-msvc
      Configuration: Debug
      # Pipeline variables defined within ADO
      BranchCoverage: $(branch_coverage)
      LineCoverage: $(line_coverage)
      ArtifactName: Unit_Test_x86

# Promote is to tag the merge commit so that it can be used by tag reference. This stage is configured to tag by BuildNumber after every PR closure.
- stage: Promote
  dependsOn: [Unit_Test_x86, Build_x86_Debug, Build_Arm_EABI_AARCH_Debug, SVP_Pythia_Tests_SingleDie, SVP_Pythia_Tests_DualDie]
  # Promote only builds triggered on the main branch (ignore PR build triggers), and ignore manual builds triggered on main for publish (prevents re-tagging)
  condition: and(eq(variables['OfficialBuild'], 'true'), ne(variables['Build.Reason'], 'Manual'))
  pool: 
    name: 1pfw-kingsgate-windows
  jobs:
  - template: templates/promote.yaml
    parameters:
      ArtifactName: kingsgate_mscp  
