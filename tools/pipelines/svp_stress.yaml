name: $(Build.DefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd).$(Rev:r)

trigger: none

resources:
  pipelines:
  - pipeline: CIPipeline
    source: Kingsgate.MSCP-Official
    branch: main  

variables:
- group: ef-pipeline-config-azurekv    # Centralized PAT Library Group
- name: OfficialBuild
  value : $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
- name: BUILD_ID
  value : $(resources.pipeline.CIPipeline.runID)
- ${{ if variables['OfficialBuild'] }}:
  - name: BuildVersion
    value: $[ variables['Build.BuildNumber'] ]
- ${{ else }}:
  - name: BuildVersion
    value:  $[format('{0}-dev', variables['Build.BuildNumber'])]

stages:
- stage: SVP_Pythia_Nightly_Stress_Tests
  dependsOn: []
  jobs:
  - template: templates/svp_pythia_test.yaml
    parameters:
      ArtifactName: SVP_Pythia_Nightly_Stress_Tests
      build_id: $(BUILD_ID)
      TestPlan: $(Test_Plan_Single)

- stage: SVP_Pythia_Nightly_Stress_DualDie_Tests
  dependsOn: []
  jobs:
  - template: templates/svp_pythia_test.yaml
    parameters:
      ArtifactName: SVP_Pythia_Nightly_Stress_DualDie_Tests
      build_id: $(BUILD_ID)
      TestPlan: $(Test_Plan_Dual)

- stage: SVP_Accel_Nightly_Stress_Tests
  dependsOn: []
  jobs:
  - template: templates/svp_pythia_test.yaml@self
    parameters:
      ArtifactName: SVP_Accel_Nightly_Stress_Tests
      build_id: $(BUILD_ID)
      TestPlan: .\tests\functional\test_plan\svp_nightly_stress_accel_test_plan.args
      ifwi: '.\.build\Debug\arm-eabi-aarch\bin\flash\kingsgate.ifwi.ap.baremetal.debug.dat'

# This is to tag the commits that pass nightly tests.
- stage: Promote
  dependsOn: [ SVP_Pythia_Nightly_Stress_Tests, SVP_Pythia_Nightly_Stress_DualDie_Tests, SVP_Accel_Nightly_Stress_Tests ]
  # Promote only builds triggered on the main branch (ignore PR build triggers), and ignore manual builds triggered on main for publish (prevents re-tagging)
  condition: and(eq(variables['OfficialBuild'], 'true'), ne(variables['Build.Reason'], 'Manual'))
  pool:
    name: 1pfw-kingsgate-windows
    demands:
    - ImageOverride -equals 1pfw-win2022vNext
  jobs:
  - template: templates/promote.yaml
    parameters:
      ArtifactName: kingsgate_mscp_$(RunSchedule)_stress