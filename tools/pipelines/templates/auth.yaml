steps:
- task: PowerShell@2
  displayName: External repo access
  inputs:
    targetType: 'inline'
    script: |
      
      # Variable Group: https://azurecsi.visualstudio.com/Woodinville/_library?itemType=VariableGroups&view=VariableGroupView&variableGroupId=951&path=ef-pipeline-config-azurekv
      $SilibsAuthToken = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$(ms-tsd-code-read-autorotated)"))
      $DuvallFWAuthToken = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$(1pfw-code-read-autorotated)"))

      #
      # set up git config 
      #

      # mirrors
      git config --global http.https://azurecsi.visualstudio.com/DuvallFw/_git/mirror.cmocka/.extraheader "AUTHORIZATION: Basic $DuvallFWAuthToken"
      git config --global http.https://dev.azure.com/AzureCSI/DuvallFw/_git/mirror.cmsis_6/.extraheader "AUTHORIZATION: Basic $DuvallFWAuthToken"
      git config --global http.https://dev.azure.com/AzureCSI/DuvallFw/_git/mirror.threadx/.extraheader "AUTHORIZATION: Basic $DuvallFWAuthToken"
      git config --global http.https://azurecsi.visualstudio.com/DuvallFw/_git/mirror.pldm.extraheader "AUTHORIZATION: Basic $DuvallFWAuthToken"

      # zlib internal copy
      git config --global http.https://dev.azure.com/AzureCSI/Woodinville/_git/mirror_zlib/.extraheader  "Authorization: bearer $(System.AccessToken)"

      # fpfw repos
      git config --global http.https://azurecsi.visualstudio.com/DuvallFw/_git/1pfw.fwlibs/.extraheader "AUTHORIZATION: Basic $DuvallFWAuthToken"
      git config --global http.https://azurecsi.visualstudio.com/Woodinville/_git/Kingsgate.CortexM7/.extraheader "AUTHORIZATION: Basic $DuvallFWAuthToken"

      # silibs repos
      git config --global http.https://dev.azure.com/ms-tsd/SiInfra/_git/silibs_common/.extraHeader "AUTHORIZATION: Basic $SilibsAuthToken"
      git config --global http.https://dev.azure.com/ms-tsd/Kingsgate/_git/silibs/.extraHeader "AUTHORIZATION: Basic $SilibsAuthToken"
      git config --global http.https://dev.azure.com/ms-tsd/Base_IP/_git/sdm_fw_libs/.extraHeader "AUTHORIZATION: Basic $SilibsAuthToken"
      git config --global http.https://dev.azure.com/ms-tsd/Base_IP/_git/cded_fw_libs/.extraHeader "AUTHORIZATION: Basic $SilibsAuthToken"
      git config --global http.https://dev.azure.com/ms-tsd/Base_IP/_git/crypto_fw_libs/.extraHeader "AUTHORIZATION: Basic $SilibsAuthToken"

- task: NuGetAuthenticate@1

- task: PipAuthenticate@1
  displayName: 'Pip Authenticate'
  inputs:
    artifactFeeds: 'Woodinville/echofalls.fw.deps'