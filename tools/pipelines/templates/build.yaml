parameters:
- name: ArtifactName
  type: string
  default: 'bins'
- name: Toolchain
  type: string
  default: 'i386-pc-windows-msvc'
- name: Configuration
  type: string
  default: 'Release'

jobs:
- job: 'Build'
  pool: 
    name: 1pfw-kingsgate-windows
    isCustom: true
    type: windows

  variables:
    ob_outputDirectory: '$(Build.SourcesDirectory)/.build/${{ parameters.Configuration }}/${{ parameters.Toolchain }}/'

  displayName: Build
  steps: 

    # Set up permissions for other repos
    - template: auth.yaml

    # Main build task, performs setenv for given toolchain/config selected and
    # the build command
    - task: PowerShell@2
      displayName: Build
      env:
        AZURE_DEVOPS_EXT_PAT : $(System.AccessToken)
      inputs:
        workingDirectory: '$(Build.SourcesDirectory)'
        targetType: 'inline'
        script: |
          ./start.ps1 -Toolchain ${{ parameters.Toolchain }} -Configuration ${{ parameters.Configuration }}
          build
    
    - task: PowerShell@2
      displayName: Copy Artifacts
      inputs:
        targetType: 'inline'
        script: |
          mkdir -p publish
          Copy-Item -Path .\.build\${{ parameters.Configuration }}\**\bin\* -Recurse -Destination ./publish
          Copy-Item -Recurse ./publish $(Build.ArtifactStagingDirectory)

    - task: PublishSymbols@2
      displayName: Publish Symbol Files - Debug and Release
      condition: succeeded()
      inputs:
        SymbolsFolder: '$(Build.ArtifactStagingDirectory)/publish'
        SearchPattern: |
          *.elf
          *.pdb
        SymbolServerType: 'TeamServices'
        SymbolExpirationInDays: '365'

    # Publish results as a pipeline artifact
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.SourcesDirectory)/.build/${{ parameters.Configuration }}/${{ parameters.Toolchain }}/'
        artifact: 'drop_${{ parameters.ArtifactName }}_Build'
        publishLocation: 'pipeline'
