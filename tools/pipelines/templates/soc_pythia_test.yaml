parameters:
- name: Toolchain
  type: string
  default: 'arm-eabi-aarch'
- name: Configuration
  type: string
  default: 'Debug' 
- name: ArtifactName
  type: string
  default: 'bins'
- name: Pool
  type: string
  default: '1pfw-kingsgate-soc'
- name: TestVehicleCapability
  type: string
  default: 'SocSingleDie'  
- name: TestPlan
  type: string
  default: '.\tests\functional\test_plan\soc_single_die_test_plan.args'
- name: TestAgent
  type: string
  default: ''
- name: build_id
  type: string
  default: '0'
- name: ifwi
  type: string
  default: 'kingsgate.ifwi.soc.debug.custom.dat'
- name : TimeoutInMinutes
  type: number
  default: 240
- name: tdk_repo_name
  type: string
- name: azure_subscription
  type: string
- name: nuget_service_connections
  type: string
- name: keyvault_name
  type: string


jobs:
- job: 'SOC_Pythia_Tests'
  timeoutInMinutes: ${{ parameters.TimeoutInMinutes }}
  displayName: SOC Pythia Tests
  pool: 
    name: ${{ parameters.Pool }}
    demands:
      - ${{ if eq(parameters.Pool, '1pfw-kingsgate-soc') }}:
          - TestVehicle -equals ${{ parameters.TestVehicleCapability }}
    isCustom: true
    type: windows

  variables:
    ob_outputDirectory: '$(Build.SourcesDirectory)\.testlogs\pythia'
    ob_artifactSuffix: '$(System.JobAttempt)'

  steps: 

    # Set up permissions for other repos
    - template: auth.yaml

    # Dump agent information (useful for debugging)
    - template: agent_info.yaml

    # Download secure file for credential usage
    - task: DownloadSecureFile@1
      name: credFile
      inputs:
        secureFile: 'robot-secure-txt.yml'

    # Download input artifact for CI & nightly run
    - task: DownloadPipelineArtifact@2
      condition: and(succeeded(), eq('${{ parameters.build_id }}', '0'))
      inputs:
          buildType: 'current'
          downloadType: 'single'
          artifactName: 'drop_Build_Arm_EABI_AARCH_Debug_Build'
          downloadPath: '$(Build.SourcesDirectory)\.build\Debug\arm-eabi-aarch'

    # Download input artifact for Nightly and Weekend Stress
    - task: DownloadPipelineArtifact@2
      condition: and(succeeded(), ne('${{ parameters.build_id }}', '0'))
      inputs:
          buildType: 'specific'
          project: '2610da6a-0168-48f8-b34a-f1c882cb6660'  # Woodinville
          definition: '8678'  # Kingsgate.MSCP-Official
          buildVersionToDownload: 'specific'
          buildId: ${{ parameters.build_id}}
          artifactName: 'drop_Build_Arm_EABI_AARCH_Debug_Build'
          downloadPath: '$(Build.SourcesDirectory)\.build\Debug\arm-eabi-aarch'

    # Setup the SOC
    - task: PowerShell@2
      displayName: 'Flash SOC IFWI'
      env:
        AZURE_DEVOPS_EXT_PAT : $(System.AccessToken)
      inputs:
        workingDirectory: '$(Build.SourcesDirectory)'
        targetType: 'inline'
        showWarnings: true
        script: | 
          # Cleanup pip cache - Holding off purging process to speedup artifact download
          #pip cache purge

          # Init Env
          ./start.ps1 -Toolchain ${{ parameters.Toolchain }} -Configuration ${{ parameters.Configuration }}

          # Kill all Trace32 Sessions
          killt32soc

          # Kill all Putty Sessions 
          killputtysoc

          # Reset all COM ports
          #python .\tests\functional\library\kng_pythia_libs\fpga_reset_com_ports.py

          # Get system name
          $system_name = $env:AGENT_NAME
          
          # Kick all users out
          kickusersoc -system $system_name

          # Flash firmware
          flashscpfwsoc -system $system_name -securefile $(credFile.secureFilePath)


    - task: AzureKeyVault@2
      inputs:
        azureSubscription: "$(azure_subscription)"
        KeyVaultName: '$(keyvault_name)'
        SecretsFilter: '*'
        RunAsPreJob: true

    # 1. Setup the environment
    # 2. Invoke Pythia
    # Logs will be under $(Build.SourcesDirectory)\.testlogs\pythia
    - task: AzureCLI@2
      displayName: 'Set Variables for KeyRing'
      env:
        AZURE_DEVOPS_EXT_PAT : $(System.AccessToken)
        SECURE_FILE_PATH: $(credFile.secureFilePath)
        keyvault_name: $(keyvault_name)
      inputs:
        azureSubscription: "$(azure_subscription)"
        workingDirectory: '$(Build.SourcesDirectory)'
        scriptType: ps
        scriptLocation: inlineScript
        addSpnToEnvironment: true
        failOnStandardError: false
        powerShellIgnoreLASTEXITCODE: true
        inlineScript: | 
          echo "##vso[task.setvariable variable=AZURE_CLIENT_ID;issecret=true]$env:servicePrincipalId"
          echo "##vso[task.setvariable variable=AZURE_SUBSCRIPTION_ID;issecret=true]$(az account show --query 'id' -o tsv)"
          echo "##vso[task.setvariable variable=AZURE_TENANT_ID;issecret=true]$env:tenantId"

          $tokenFile = Join-Path $env:AGENT_TEMPDIRECTORY 'federated-token.jwt'
          [System.IO.File]::WriteAllText($tokenFile, $env:idToken)
          echo "##vso[task.setvariable variable=AZURE_FEDERATED_TOKEN_FILE;issecret=true]$tokenFile"

    - task: PowerShell@2
      displayName: 'Test: Run SOC Pythia Tests'
      env:
        AZURE_DEVOPS_EXT_PAT : $(System.AccessToken)
        SECURE_FILE_PATH: $(credFile.secureFilePath)
        keyvault_name: $(keyvault_name)
        AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
        AZURE_FEDERATED_TOKEN_FILE: $(AZURE_FEDERATED_TOKEN_FILE)
        AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
        AZURE_TENANT_ID: $(AZURE_TENANT_ID)
      inputs:
        azureSubscription: "$(azure_subscription)"
        workingDirectory: '$(Build.SourcesDirectory)'
        targetType: 'inline'
        showWarnings: true
        script: | 
          echo "AZURE_CLIENT_ID: $env:AZURE_CLIENT_ID"
          echo "AZURE_CLIENT_SECRET: $env:AZURE_CLIENT_SECRET"
          echo "AZURE_SUBSCRIPTION_ID: $env:AZURE_SUBSCRIPTION_ID"
          echo "AZURE_TENANT_ID: $env:AZURE_TENANT_ID"


          ./start.ps1 -Toolchain ${{ parameters.Toolchain }} -Configuration ${{ parameters.Configuration }}
          # Initializing keyring to use it for Non nuc agents
          & ${env:REPO_APP_PATH_python.win64}\tools\python.exe -m pythia.tdk.rrm.payload_download.access_management_interface `
              --config_file "$(System.DefaultWorkingDirectory)/tests/functional/hosts/soc_hosts/keyvault_params.json" `
              --auth_mode "default_credential"

          # Get system name
          $system_name = $env:AGENT_NAME

          Invoke-Pythia -test ${{ parameters.TestPlan }} -platform soc -TrimmedAgentName $system_name

          # Remove intermediate output / output that contains system variables (ie: Azure credentials)
          Remove-Item "$(Build.SourcesDirectory)\.testlogs\pythia\**\output.xml"
          Remove-Item "$(Build.SourcesDirectory)\.testlogs\pythia\**\rlog.txt"
          Remove-Item "$(Build.SourcesDirectory)\.testlogs\pythia\**\generated" -Recurse -Force
          Remove-Item .externs -Force -Recurse

          # Cleanup pip cache after the test
          #pip cache purge

    # Publish the results of the test suite
    - task: PublishTestResults@2
      displayName: 'Publish: SOC Pythia Test Results'
      condition: succeededOrFailed()
      inputs:
        testRunTitle: 'Kingsgate SOC Pythia Tests'
        testResultsFormat: 'JUnit'
        testResultsFiles: '**\Results.xml'
        searchFolder: '$(Build.SourcesDirectory)\.testlogs\pythia'
        failTaskOnFailedTests: true
        publishRunAttachments: true
        mergeTestResults: true

    - task: PowerShell@2
      displayName: 'Prepare Pythia Logs for Publishing'
      condition: always()
      inputs:
        targetType: 'inline'
        script: |
          $source = "$(Build.SourcesDirectory)\.testlogs\pythia"
          $target = "$(Build.ArtifactStagingDirectory)\pythia_clean"
          New-Item -ItemType Directory -Force -Path $target

          Get-ChildItem -Path $source -Recurse | ForEach-Object {
            try {
              $relativePath = $_.FullName.Substring($source.Length)
              $destPath = Join-Path -Path $target -ChildPath $relativePath
              $destDir = Split-Path -Path $destPath -Parent
              New-Item -ItemType Directory -Force -Path $destDir | Out-Null

              $stream = [System.IO.File]::Open($_.FullName, 'Open', 'Read', 'None')
              $stream.Close()
              Copy-Item $_.FullName -Destination $destPath -Force
            } catch {
              Write-Host "Skipping locked file: $($_.FullName)"
            }
          }

    # Publish results as a pipeline artifact
    - task: PublishPipelineArtifact@1
      displayName: 'Publish: Pipeline Artifacts'
      condition: always()
      inputs:
        targetPath: $(Build.ArtifactStagingDirectory)\pythia_clean
        artifact: 'drop_${{ parameters.ArtifactName }}_SOC_Pythia_Tests$(System.JobAttempt)'
        publishLocation: 'pipeline'
        parallel: true

    - task: PowerShell@2
      displayName: Cleanup Workspace
      condition: not(canceled())
      inputs:
        targetType: 'inline'
        showWarnings: true
        script: |
          Remove-Item -Path "$(Build.SourcesDirectory)\*" -Force -Recurse